<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom Intelligence | Evidence Terminal</title>
    <!-- Core Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; background-color: #0F172A; }
        /* Pro UI Elements */
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .nav-sticky { position: sticky; top: 0; z-index: 999; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .forest-line { height: 2px; background: #334155; position: relative; width: 100%; }
        .forest-diamond { width: 14px; height: 14px; background: #10B981; transform: rotate(45deg); position: absolute; top: -6px; margin-left: -7px; }
        .confidence-interval { height: 2px; background: #10B981; position: absolute; top: 0; }
    </style>
</head>
<body class="text-slate-200 antialiased selection:bg-emerald-500/30">

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const AxiomProApp = () => {
            // State for the Terminal's internal view
            const [terminalView, setTerminalView] = useState('LIST');

            // Smooth scrolling logic
            const scrollTo = (id) => {
                const element = document.getElementById(id);
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    
                    {/* --- PERSISTENT GLOBAL NAVIGATION --- */}
                    <nav className="nav-sticky px-6 py-4 flex justify-between items-center transition-all">
                        <div onClick={() => scrollTo('hero-section')} className="text-xl font-black tracking-tighter cursor-pointer hover:opacity-80 transition">
                            AXIOM <span className="text-emerald-500">INTELLIGENCE</span>
                        </div>
                        <div className="flex gap-6 items-center">
                            <button onClick={() => scrollTo('hero-section')} className="text-xs font-bold text-slate-400 hover:text-white transition uppercase tracking-wider">Overview</button>
                            <button onClick={() => scrollTo('terminal-section')} className="bg-emerald-500/10 text-emerald-400 text-xs font-bold border border-emerald-500/30 px-5 py-2.5 rounded-full hover:bg-emerald-500 hover:text-white transition uppercase tracking-wider">
                                Access Terminal
                            </button>
                        </div>
                    </nav>

                    {/* --- HERO / LANDING SECTION --- */}
                    <header id="hero-section" className="flex flex-col justify-center items-center text-center pt-32 pb-24 px-6 min-h-[80vh]">
                        <div className="inline-block mb-6 px-3 py-1 rounded-full border border-slate-700 bg-slate-800/50 text-[10px] font-bold tracking-widest uppercase text-slate-400">
                            Institutional Pipeline <span className="text-emerald-500 ml-2">● Live</span>
                        </div>
                        <h1 className="text-5xl md:text-7xl font-black text-white mb-8 leading-tight max-w-4xl tracking-tight">
                            Real-Time Evidence Synthesis <br/>
                            <span className="text-slate-500">for Precision Medicine</span>
                        </h1>
                        <p className="text-lg md:text-xl text-slate-400 mb-12 max-w-2xl leading-relaxed">
                            Axiom bridges the critical gap between Clinical Congress data releases and point-of-care decision making, delivering actionable intelligence in seconds.
                        </p>
                        <button onClick={() => scrollTo('terminal-section')} className="group relative bg-emerald-600 text-white px-8 py-4 rounded-lg font-bold text-lg hover:bg-emerald-500 transition shadow-[0_0_40px_-10px_rgba(16,185,129,0.3)]">
                            Launch 2026 Pipeline
                            <span className="ml-2 group-hover:translate-x-1 inline-block transition-transform">→</span>
                        </button>
                    </header>

                    {/* --- INTERACTIVE TERMINAL SECTION --- */}
                    <section id="terminal-section" className="bg-[#0B1120] py-32 border-t border-slate-800/50 relative">
                        {/* Background glow effect */}
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-3xl h-64 bg-emerald-500/5 blur-[120px] rounded-full pointer-events-none"></div>
                        
                        <div className="max-w-4xl mx-auto px-6 relative z-10">
                            <div className="mb-10 flex justify-between items-end">
                                <div>
                                    <h2 className="text-3xl font-bold text-white tracking-tight">2026 Congress Terminal</h2>
                                    <p className="text-emerald-500 text-xs mt-2 uppercase tracking-[0.2em] font-bold">Secure Access Granted</p>
                                </div>
                            </div>

                            <div className="glass-panel rounded-2xl overflow-hidden shadow-2xl min-h-[500px]">
                                <div className="bg-slate-800/50 px-6 py-4 border-b border-slate-700/50 flex justify-between items-center">
                                    <div className="flex gap-2">
                                        <div className="w-3 h-3 rounded-full bg-rose-500/80"></div>
                                        <div className="w-3 h-3 rounded-full bg-amber-500/80"></div>
                                        <div className="w-3 h-3 rounded-full bg-emerald-500/80"></div>
                                    </div>
                                    <span className="text-[10px] font-mono text-slate-500">AXIOM_OS_V2.6</span>
                                </div>

                                <div className="p-8 md:p-10">
                                    {terminalView === 'LIST' ? (
                                        <div className="space-y-4">
                                            {/* Active Item */}
                                            <div onClick={() => setTerminalView('DETAIL')} className="bg-slate-800/40 p-6 md:p-8 rounded-xl border border-slate-700 hover:border-emerald-500/50 cursor-pointer flex justify-between items-center transition group hover:bg-slate-800/60">
                                                <div>
                                                    <div className="text-emerald-500 text-[10px] font-bold mb-2 uppercase tracking-[0.2em]">ASCO 2026 • Practice Changing</div>
                                                    <div className="text-white text-xl font-bold">Pancreatic Adenocarcinoma</div>
                                                </div>
                                                <div className="w-10 h-10 rounded-full bg-slate-900/50 flex items-center justify-center border border-slate-700 group-hover:border-emerald-500/50 transition">
                                                    <span className="text-emerald-500 group-hover:translate-x-1 transition-transform">→</span>
                                                </div>
                                            </div>
                                            {/* Locked Item */}
                                            <div className="bg-slate-800/20 p-6 md:p-8 rounded-xl border border-slate-800/50 opacity-60 cursor-not-allowed flex justify-between items-center">
                                                <div>
                                                    <div className="text-slate-500 text-[10px] font-bold mb-2 uppercase tracking-[0.2em]">ESMO 2026 • Late Breaking</div>
                                                    <div className="text-slate-400 text-xl font-bold font-mono">TNBC / ADC Combo</div>
                                                </div>
                                                <div className="text-xs font-mono text-slate-500 px-3 py-1 bg-slate-900 rounded border border-slate-800">DATA LOCKED</div>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="animate-in fade-in zoom-in-95 duration-300">
                                            {/* Pro Navigation inside Terminal */}
                                            <button onClick={() => setTerminalView('LIST')} className="text-slate-400 hover:text-emerald-400 text-xs font-bold mb-8 flex items-center gap-2 transition group">
                                                <span className="group-hover:-translate-x-1 transition-transform">←</span> Return to Pipeline
                                            </button>
                                            
                                            <div className="bg-[#0B1120] p-8 md:p-10 rounded-2xl border border-slate-700/50 shadow-inner">
                                                <h3 className="text-2xl font-bold text-white mb-10">Pancreatic Adenocarcinoma <span className="text-emerald-500 font-mono text-sm ml-2 bg-emerald-500/10 px-2 py-1 rounded">Synthesis Complete</span></h3>
                                                
                                                <div className="flex justify-between text-[10px] font-black text-slate-500 mb-8 uppercase tracking-[0.2em]">
                                                    <span className="w-1/3">Favors Treatment</span>
                                                    <span className="w-1/3 text-center">Null (1.0)</span>
                                                    <span className="w-1/3 text-right">Favors Control</span>
                                                </div>
                                                
                                                <div className="forest-line">
                                                    <div className="absolute left-1/2 -top-4 bottom-[-40px] border-l border-dashed border-slate-600"></div>
                                                    <div className="confidence-interval" style={{left: '20%', width: '15%'}}></div>
                                                    <div className="forest-diamond" style={{left: '27%'}}></div>
                                                </div>
                                                
                                                <div className="mt-16 flex flex-col md:flex-row justify-between items-start md:items-center p-4 bg-slate-900/50 rounded-lg border border-slate-800">
                                                    <div className="mb-4 md:mb-0">
                                                        <div className="text-white font-bold font-mono">RASolute 302 Phase III</div>
                                                        <div className="text-slate-500 text-xs font-mono uppercase mt-1">n=1,240 • p &lt; 0.001</div>
                                                    </div>
                                                    <div className="text-left md:text-right">
                                                        <div className="text-emerald-400 font-black text-3xl font-mono tracking-tighter">HR 0.40</div>
                                                        <div className="text-slate-400 text-[10px] font-mono mt-1">95% CI [0.32 - 0.49]</div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AxiomProApp />);
    </script>
</body>
</html>
