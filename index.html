<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom Intelligence | Evidence Terminal</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; background-color: #0F172A; }
        .forest-line { height: 2px; background: #334155; position: relative; width: 100%; }
        .forest-diamond { width: 12px; height: 12px; background: #10B981; transform: rotate(45deg); position: absolute; top: -5px; margin-left: -6px; }
        .confidence-interval { height: 2px; background: #10B981; position: absolute; top: 0; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .sticky-nav { position: sticky; top: 0; z-index: 100; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="text-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const AxiomApp = () => {
            const [view, setView] = useState('LIST');

            const scrollToSection = (id) => {
                const element = document.getElementById(id);
                if (element) element.scrollIntoView({ behavior: 'smooth' });
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* --- PERSISTENT NAV BAR --- */}
                    <nav className="sticky-nav px-8 py-4 flex justify-between items-center">
                        <div onClick={() => scrollToSection('hero')} className="text-xl font-black tracking-tighter cursor-pointer hover:opacity-80">
                            AXIOM <span className="text-emerald-500">INTELLIGENCE</span>
                        </div>
                        <div className="flex gap-6 items-center">
                            <button onClick={() => scrollToSection('hero')} className="text-xs font-bold text-slate-400 hover:text-white transition">HOME</button>
                            <button onClick={() => scrollToSection('terminal')} className="bg-emerald-600/10 text-emerald-500 text-xs font-bold border border-emerald-500/20 px-4 py-2 rounded-full hover:bg-emerald-500 hover:text-white transition">LIVE DEMO</button>
                        </div>
                    </nav>

                    {/* --- HERO SECTION --- */}
                    <header id="hero" className="flex-none max-w-4xl mx-auto text-center py-32 px-6">
                        <h1 className="text-6xl font-black text-white mb-6 leading-tight">Real-Time Evidence Synthesis</h1>
                        <p className="text-xl text-slate-400 mb-10">Institutional-grade clinical data at the speed of thought.</p>
                        <button onClick={() => scrollToSection('terminal')} className="bg-emerald-600 text-white px-10 py-4 rounded-lg font-bold text-lg hover:bg-emerald-500 transition shadow-xl shadow-emerald-900/20">
                            View 2026 Pipeline
                        </button>
                    </header>

                    {/* --- TERMINAL SECTION --- */}
                    <section id="terminal" className="flex-none bg-slate-900/50 py-24 border-t border-slate-800">
                        <div className="max-w-4xl mx-auto px-6">
                            <div className="mb-8">
                                <h2 className="text-3xl font-bold text-white tracking-tight">2026 Pipeline Terminal</h2>
                                <p className="text-slate-500 text-sm mt-1 uppercase tracking-widest font-bold">Interactive Evidence Synthesis</p>
                            </div>

                            <div className="glass-card rounded-2xl overflow-hidden shadow-2xl min-h-[500px]">
                                <div className="p-8">
                                    {view === 'LIST' ? (
                                        <div className="space-y-4">
                                            <div onClick={() => setView('DETAIL')} className="bg-slate-800/40 p-8 rounded-xl border border-slate-700 hover:border-emerald-500/50 cursor-pointer flex justify-between items-center transition group">
                                                <div>
                                                    <div className="text-emerald-500 text-[10px] font-bold mb-1 uppercase tracking-[0.2em]">ASCO 2026 • ONCOLOGY</div>
                                                    <div className="text-white text-xl font-bold">Pancreatic Adenocarcinoma</div>
                                                </div>
                                                <span className="text-2xl group-hover:translate-x-2 transition-transform">→</span>
                                            </div>
                                            <div className="bg-slate-800/20 p-8 rounded-xl border border-slate-800 opacity-50 cursor-not-allowed">
                                                <div className="text-slate-500 text-[10px] font-bold mb-1 uppercase tracking-[0.2em]">ESMO 2026 • BREAST CANCER</div>
                                                <div className="text-slate-400 text-xl font-bold font-mono italic">DATA ENCRYPTED</div>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="animate-in fade-in slide-in-from-bottom-4 duration-300">
                                            <button onClick={() => setView('LIST')} className="text-emerald-500 text-xs font-bold mb-8 flex items-center gap-2 hover:translate-x-[-4px] transition-transform">
                                                <span>←</span> BACK TO LIST
                                            </button>
                                            
                                            <div className="bg-slate-900/80 p-10 rounded-2xl border border-slate-800">
                                                <div className="flex justify-between text-[10px] font-black text-slate-500 mb-10 uppercase tracking-[0.3em]">
                                                    <span>Favors Axiom</span><span>Null (1.0)</span><span>Favors Control</span>
                                                </div>
                                                <div className="forest-line">
                                                    <div className="absolute left-1/2 -top-2 bottom-0 border-l border-dashed border-slate-700"></div>
                                                    <div className="confidence-interval" style={{left: '18%', width: '12%'}}></div>
                                                    <div className="forest-diamond" style={{left: '24%'}}></div>
                                                </div>
                                                <div className="mt-12 flex justify-between items-center">
                                                    <div>
                                                        <div className="text-white font-bold text-lg">RASolute 302 Phase III</div>
                                                        <div className="text-slate-500 text-xs font-mono uppercase">Sample Size: n=1,240</div>
                                                    </div>
                                                    <div className="text-right">
                                                        <div className="text-emerald-500 font-black text-3xl font-mono">HR 0.40</div>
                                                        <div className="text-slate-500 text-[10px] font-mono">95% CI [0.32 - 0.49]</div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </section>

                    <footer className="mt-auto py-12 text-center border-t border-slate-900">
                        <div onClick={() => scrollToSection('hero')} className="text-slate-600 text-[10px] uppercase tracking-[0.4em] font-bold cursor-pointer hover:text-slate-400">
                            Axiom Intelligence Systems • Institutional Pipeline
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AxiomApp />);
    </script>
</body>
</html>
